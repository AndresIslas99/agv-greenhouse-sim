    width: 0.05                   # meters (50mm)
    left:
      xyz: [0.0, 0.3675, -0.1375]
    right:
      xyz: [0.0, -0.3675, -0.1375]
    track_width: 0.735            # meters (367.5mm x 2)

  chassis:
    length: 1.0
    width: 0.6
    height: 0.15
    mass: 30.0
    visual_x_offset: 0.2

  sensors:
    imu:
      xyz: [0.7, 0.0, -0.055]
      rpy: [0.0, 0.0, 0.0]
    lidar:
      xyz: [0.5, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
