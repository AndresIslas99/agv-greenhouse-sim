# Collision monitor configuration for AGV simulation
#
# Provides safety stop and slowdown zones around the robot.

collision_monitor:
  ros__parameters:
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0

    polygons: ['PolygonStop', 'PolygonSlow']

    PolygonStop:
      type: "polygon"
      points: [0.7, 0.35, 0.7, -0.35, -0.3, -0.35, -0.3, 0.35]
      action_type: "stop"
      max_points: 3
      visualize: true
      polygon_pub_topic: "polygon_stop"

    PolygonSlow:
      type: "polygon"
      points: [1.0, 0.5, 1.0, -0.5, -0.5, -0.5, -0.5, 0.5]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.3
      visualize: true
      polygon_pub_topic: "polygon_slowdown"

    observation_sources: ['scan']
    scan:
      type: "scan"
      topic: scan
